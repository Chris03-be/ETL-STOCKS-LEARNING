version: 2

models:
  - name: stg_stock_prices
    description: "Données boursières nettoyées et standardisées (Couche Silver)"
    columns:
      - name: symbol
        description: "Le ticker de l'action (ex: AAPL, MSFT)"
        data_tests:
          - not_null
      - name: date
        description: "La date de cotation boursière"
        data_tests:
          - not_null
      - name: close
        description: "Le prix de clôture du jour."
        data_tests:
          - not_null